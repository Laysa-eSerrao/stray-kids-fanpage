<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Página não encontrada | Stray Kids Fan Page</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23e8192c'/><text y='.9em' font-size='80' font-family='Arial Black,sans-serif' font-weight='900' fill='white' x='15'>K</text></svg>" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --red: #e8192c;
      --grad: linear-gradient(135deg, #e8192c, #ff3d6e, #ff6b35);
    }
    body {
      font-family: 'Inter', sans-serif;
      background: #111111;
      color: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      position: relative;
      overflow: hidden;
    }

    /* Grid de fundo */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        repeating-linear-gradient(90deg, transparent, transparent 60px, #ffffff03 60px, #ffffff03 61px),
        repeating-linear-gradient(0deg, transparent, transparent 60px, #ffffff03 60px, #ffffff03 61px);
      pointer-events: none;
    }

    /* Glow vermelho */
    body::after {
      content: '';
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 600px; height: 600px;
      background: radial-gradient(circle, #e8192c18 0%, transparent 65%);
      pointer-events: none;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 560px;
    }

    .error-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(100px, 25vw, 180px);
      letter-spacing: 10px;
      line-height: 1;
      background: var(--grad);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: .5rem;
      animation: pulse 3s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: .7; }
    }

    .skz-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18px;
      letter-spacing: 8px;
      color: #ffffff40;
      margin-bottom: 1.5rem;
      text-transform: uppercase;
    }

    .error-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(28px, 6vw, 44px);
      letter-spacing: 4px;
      color: #fff;
      margin-bottom: 1rem;
      line-height: 1.1;
    }

    .error-desc {
      font-size: 15px;
      color: #888;
      line-height: 1.8;
      margin-bottom: 2.5rem;
      max-width: 400px;
      margin-left: auto;
      margin-right: auto;
    }

    .error-desc strong { color: #ff6b7a; font-weight: 500; }

    .skzoo-row {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-bottom: 2.5rem;
      flex-wrap: wrap;
    }

    .skzoo-char {
      width: 56px; height: 56px;
      border-radius: 50%;
      overflow: hidden;
      border: 2px solid #e8192c40;
      animation: float 3s ease-in-out infinite;
    }

    .skzoo-char:nth-child(2) { animation-delay: .4s; }
    .skzoo-char:nth-child(3) { animation-delay: .8s; }
    .skzoo-char:nth-child(4) { animation-delay: 1.2s; }
    .skzoo-char:nth-child(5) { animation-delay: 1.6s; }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .skzoo-char img {
      width: 100%; height: 100%;
      object-fit: cover;
    }

    .btn-home {
      display: inline-block;
      background: var(--grad);
      color: #fff;
      font-size: 12px;
      letter-spacing: 3px;
      text-transform: uppercase;
      font-weight: 700;
      padding: 14px 36px;
      border-radius: 30px;
      text-decoration: none;
      transition: .3s;
      box-shadow: 0 4px 20px #e8192c40;
      margin-right: 10px;
      margin-bottom: 10px;
    }
    .btn-home:hover { transform: translateY(-3px); box-shadow: 0 8px 30px #e8192c60; }

    .btn-back {
      display: inline-block;
      background: none;
      color: #888;
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 500;
      padding: 14px 24px;
      border-radius: 30px;
      text-decoration: none;
      border: 1px solid #333;
      transition: .3s;
      margin-bottom: 10px;
    }
    .btn-back:hover { color: #fff; border-color: #555; }

    .lyric {
      margin-top: 2.5rem;
      font-size: 12px;
      color: #444;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-style: italic;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="skz-logo">Stray Kids Fan Page</div>
    <div class="error-num">404</div>
    <div class="error-title">Página não encontrada</div>
    <p class="error-desc">
      Parece que você se perdeu no caminho — assim como os <strong>Stray Kids</strong> no início.<br>
      Mas não se preocupe, todo mundo encontra o seu lugar no final! 🎵
    </p>

    <div class="skzoo-row">
      <div class="skzoo-char"><img src="https://i.pinimg.com/736x/0a/2c/b4/0a2cb4863654f61163fa566ea51ad136.jpg" alt="Wolf Chan"></div>
      <div class="skzoo-char"><img src="https://i.pinimg.com/736x/60/32/41/60324170701609e857a671d34d4c9f81.jpg" alt="Leebit"></div>
      <div class="skzoo-char"><img src="https://i.pinimg.com/736x/92/f1/f0/92f1f06ea263fdfad827cb3c6b956470.jpg" alt="Jiniret"></div>
      <div class="skzoo-char"><img src="https://i.pinimg.com/736x/62/c0/e1/62c0e18118e175467bd241e5ebb023f4.jpg" alt="Fox I.Ny"></div>
      <div class="skzoo-char"><img src="https://i.pinimg.com/1200x/ae/06/62/ae06620dbf96ac5f2559597fa61f12a4.jpg" alt="BbokAri"></div>
    </div>

    <div>
      <a href="/stray-kids-fanpage/" class="btn-home">Voltar ao início</a>
      <a href="javascript:history.back()" class="btn-back">← Voltar</a>
    </div>

    <div class="lyric">"You make Stray Kids stay" — STAY</div>
  </div>
</body>
</html>
